DEFAULT lunaos
PROMPT 1
TIMEOUT 50

LABEL lunaos
    MENU LABEL LUNA OS
    LINUX /boot/vmlinuz-linux
    INITRD /boot/initramfs-linux.img
    APPEND archisobased=LUNAOS archisosearchuuid=LUNA_OS_2026 modules=loop,squashfs modprobe.blacklist=nouveau

LABEL lunaos-nvidia
    MENU LABEL LUNA OS (NVIDIA)
    LINUX /boot/vmlinuz-linux
    INITRD /boot/initramfs-linux.img
    APPEND archisobased=LUNAOS archisosearchuuid=LUNA_OS_2026 modules=loop,squashfs nvidia.modeset=1

LABEL lunaos-safe
    MENU LABEL LUNA OS (Safe Graphics)
    LINUX /boot/vmlinuz-linux
    INITRD /boot/initramfs-linux.img
    APPEND archisobased=LUNAOS archisosearchuuid=LUNA_OS_2026 modules=loop,squashfs nomodeset
