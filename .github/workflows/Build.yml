name: Build LUNA OS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    timeout-minutes: 180

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso git

      - uses: actions/checkout@v4

      - name: Build LUNA OS ISO
        run: |
          set -e
          echo "Building LUNA OS ISO..."
          mkarchiso -v -r -w /tmp/lunaos-work -o /tmp/lunaos-out LUNA-os/configs/lunaos
          echo "Build complete"
          ls -la /tmp/lunaos-out/*.iso

      - name: QEMU boot smoke test
        if: success()
        run: |
          set -e
          ISO=$(ls /tmp/lunaos-out/*.iso | head -n1)
          echo "Testing boot of $ISO with QEMU..."

          pacman -S --noconfirm qemu-system-x86 edk2-ovmf

          cp /usr/share/edk2/x64/OVMF_VARS.fd /tmp/OVMF_VARS.fd

          timeout 120 qemu-system-x86_64 \
            -machine type=q35 -m 4096 -smp 4 \
            -accel tcg -cpu max \
            -drive if=pflash,format=raw,readonly=on,file=/usr/share/edk2/x64/OVMF_CODE.fd \
            -drive if=pflash,format=raw,file=/tmp/OVMF_VARS.fd \
            -cdrom "$ISO" -boot d \
            -display none -nographic \
            -serial file:/tmp/serial.log \
            -monitor none \
            -no-reboot || true

          echo "===== SERIAL LOG (last 100 lines) ====="
          tail -100 /tmp/serial.log || echo "No serial log found"
          echo "===== END SERIAL LOG ====="

          if grep -qi "Begin\|live-boot\|luna\|plymouth" /tmp/serial.log 2>/dev/null; then
            echo "PASS - live-boot activity detected in serial log"
          else
            echo "W: No live-boot output detected - boot may have failed"
          fi

      - name: Upload LUNA OS ISO
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: luna-os-iso
          path: /tmp/lunaos-out/*.iso
          retention-days: 7
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: luna-os-build-logs
          path: /tmp/lunaos-work/build.log
          retention-days: 7
          if-no-files-found: ignore
