# Luna OS GRUB menu
set default="0"
set timeout=15
set timeout_style=menu
insmod all_video
insmod gfxterm
insmod gzio
insmod part_gpt
insmod ext2
set gfxmode=auto
terminal_output gfxterm

menuentry "Luna OS" {
    search --no-floppy --label --set=root LUNA-OS
    linux /live/vmlinuz boot=live components quiet splash persistence user-fullname=Luna
    initrd /live/initrd.img
}

menuentry "Luna OS (clean session)" {
    search --no-floppy --label --set=root LUNA-OS
    linux /live/vmlinuz boot=live components quiet splash user-fullname=Luna
    initrd /live/initrd.img
}

menuentry "Luna OS (safe graphics)" {
    search --no-floppy --label --set=root LUNA-OS
    linux /live/vmlinuz boot=live components quiet splash nomodeset user-fullname=Luna
    initrd /live/initrd.img
}

menuentry "Reboot to firmware (UEFI)" {
    fwsetup
}
