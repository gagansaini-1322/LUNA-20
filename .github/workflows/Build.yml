name: Build Luna OS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo add-apt-repository -y universe
          sudo apt-get update
          sudo apt-get install -y \
            live-build xorriso dosfstools mtools p7zip-full \
            grub-efi-amd64-bin grub2-common \
            debootstrap squashfs-tools bc

      - name: Build GRUB EFI boot image
        run: |
          set -e
          echo "I: Building GRUB EFI binary..."
          sudo mkdir -p /tmp/grub-build
          sudo grub-mkimage \
            -O x86_64-efi \
            -o /tmp/grub-build/BOOTX64.EFI \
            -p /boot/grub \
            -d /usr/lib/grub/x86_64-efi \
            linux normal search configfile ls cat echo test true reboot \
            all_video gfxterm font gfxmenu png gettext gzio \
            iso9660 udf fat part_gpt part_msdos \
            search_label search_fs_uuid boot loopback normal \
            minicmd loadenv cpuid exfat ext2 btrfs xfs hfs udf
          echo "I: GRUB EFI binary built: $(ls -la /tmp/grub-build/BOOTX64.EFI)"

          echo "I: Creating FAT EFI boot image..."
          sudo dd if=/dev/zero of=/tmp/grub-build/efi-boot.img bs=512 count=8192 2>/dev/null
          sudo mkfs.fat -F 12 -n "EFI" /tmp/grub-build/efi-boot.img

          echo 'echo -off' | sudo tee /tmp/grub-build/startup.nsh > /dev/null
          echo 'for loadoption in EFI\BOOT\*.efi; do' | sudo tee -a /tmp/grub-build/startup.nsh > /dev/null
          echo '  if exist "%loadoption%" then' | sudo tee -a /tmp/grub-build/startup.nsh > /dev/null
          echo '    load "%loadoption%"' | sudo tee -a /tmp/grub-build/startup.nsh > /dev/null
          echo '    exit' | sudo tee -a /tmp/grub-build/startup.nsh > /dev/null
          echo '  endif' | sudo tee -a /tmp/grub-build/startup.nsh > /dev/null
          echo 'endfor' | sudo tee -a /tmp/grub-build/startup.nsh > /dev/null

          sudo mmd -i /tmp/grub-build/efi-boot.img ::EFI
          sudo mmd -i /tmp/grub-build/efi-boot.img ::EFI/BOOT
          sudo mcopy -i /tmp/grub-build/efi-boot.img /tmp/grub-build/BOOTX64.EFI ::EFI/BOOT/
          sudo mcopy -i /tmp/grub-build/efi-boot.img /tmp/grub-build/startup.nsh ::EFI/BOOT/

          echo "I: FAT EFI boot image created:"
          sudo mdir -i /tmp/grub-build/efi-boot.img ::EFI/BOOT/

      - name: Build Luna OS ISO
        working-directory: LUNA-os
        run: |
          set -o pipefail
          sudo lb clean --all
          sudo ./auto/config
          sudo lb build 2>&1 | tee build.log
          echo "===== TAIL OF build.log ====="
          tail -n 200 build.log || true
          echo "===== ISO LISTING ====="
          ls -la *.iso || true

      - name: Rebuild ISO with UEFI boot
        working-directory: LUNA-os
        run: |
          set -e
          ISO_IN=$(ls *.iso)
          ISO_OUT="${ISO_IN}"
          echo "I: Rebuilding $ISO_IN with UEFI-only boot..."

          TMPDIR=$(mktemp -d)
          sudo 7z x -o"$TMPDIR" "$ISO_IN" > /dev/null 2>&1

          sudo cp /tmp/grub-build/efi-boot.img "$TMPDIR/efi-boot.img"

          # Copy GRUB modules to ISO so GRUB can find them at /boot/grub/x86_64-efi/
          echo "I: Copying GRUB modules to ISO..."
          sudo mkdir -p "$TMPDIR/boot/grub/x86_64-efi"
          sudo cp /usr/lib/grub/x86_64-efi/*.mod "$TMPDIR/boot/grub/x86_64-efi/"
          sudo cp /usr/lib/grub/x86_64-efi/*.lst "$TMPDIR/boot/grub/x86_64-efi/" 2>/dev/null || true

          # Create symlinks in /live/ directory
          if [ -d "$TMPDIR/live" ]; then
            cd "$TMPDIR/live"
            for f in vmlinuz-*; do
              [ -f "$f" ] || continue
              sudo ln -sf "$f" vmlinuz
              break
            done
            for f in initrd.img-*; do
              [ -f "$f" ] || continue
              sudo ln -sf "$f" initrd
              break
            done
            cd -
          fi

          sudo xorriso -as mkisofs \
            -r -J \
            -V "LUNA-OS" \
            -iso-level 3 \
            -o "./$ISO_OUT" \
            -c '/boot.catalog' \
            -e efi-boot.img \
            -no-emul-boot \
            -isohybrid-gpt-basdat \
            "$TMPDIR"

          sudo rm -rf "$TMPDIR"
          echo "I: ISO rebuilt with UEFI-only boot: $(ls -la ./$ISO_OUT)"

          xorriso -indev "./$ISO_OUT" -report_el_torito as_mkisofs 2>/dev/null || true

      - name: QEMU boot smoke test
        if: success()
        run: |
          set -e
          ISO=$(ls LUNA-os/*.iso)
          echo "I: Testing boot of $ISO with QEMU..."

          sudo apt-get install -y qemu-system-x86 ovmf

          sudo cp /usr/share/OVMF/OVMF_VARS_4M.fd /tmp/OVMF_VARS.fd

          timeout 120 sudo qemu-system-x86_64 \
            -machine type=q35 -m 2048 -smp 2 \
            -accel tcg -cpu max \
            -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE_4M.fd \
            -drive if=pflash,format=raw,file=/tmp/OVMF_VARS.fd \
            -cdrom "$ISO" -boot d \
            -display none -nographic \
            -serial file:/tmp/serial.log \
            -monitor none \
            -no-reboot || true

          echo "===== SERIAL LOG (last 100 lines) ====="
          tail -100 /tmp/serial.log || echo "No serial log found"
          echo "===== END SERIAL LOG ====="

          if grep -qi "Begin\|live-boot\|luna\|plymouth" /tmp/serial.log 2>/dev/null; then
            echo "I: PASS — live-boot activity detected in serial log"
          else
            echo "W: No live-boot output detected — boot may have failed"
          fi

      - name: Upload Luna OS ISO
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: luna-os-iso
          path: LUNA-os/*.iso
          retention-days: 7
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: luna-os-build-logs
          path: LUNA-os/build.log
          retention-days: 7
          if-no-files-found: ignore
