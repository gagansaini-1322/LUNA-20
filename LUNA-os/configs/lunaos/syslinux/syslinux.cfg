DEFAULT lunaos
PROMPT 1
TIMEOUT 50

LABEL lunaos
    MENU LABEL LUNA OS
    LINUX /luna/boot/x86_64/vmlinuz-linux
    INITRD /luna/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=luna archisosearchuuid=%ARCHISO_UUID% modules=loop,squashfs modprobe.blacklist=nouveau

LABEL lunaos-nvidia
    MENU LABEL LUNA OS (NVIDIA)
    LINUX /luna/boot/x86_64/vmlinuz-linux
    INITRD /luna/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=luna archisosearchuuid=%ARCHISO_UUID% modules=loop,squashfs nvidia.modeset=1

LABEL lunaos-safe
    MENU LABEL LUNA OS (Safe Graphics)
    LINUX /luna/boot/x86_64/vmlinuz-linux
    INITRD /luna/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=luna archisosearchuuid=%ARCHISO_UUID% modules=loop,squashfs nomodeset
