name: Build Luna OS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo add-apt-repository -y universe
          sudo apt-get update
          sudo apt-get install -y \
            live-build xorriso isolinux syslinux-common syslinux-utils \
            debootstrap squashfs-tools bc
          # Fix Debian Bug #873513: live-build bootloader symlinks broken on Noble
          sudo mkdir -p /usr/lib/syslinux
          sudo ln -sf /usr/lib/ISOLINUX/isolinux.bin /usr/lib/syslinux/isolinux.bin 2>/dev/null || true
          sudo ln -sf /usr/lib/syslinux/modules/bios/vesamenu.c32 /usr/lib/syslinux/vesamenu.c32 2>/dev/null || true
          # Provide our own bootloaders directory with dereferenced (real) files
          sudo mkdir -p LUNA-os/config/bootloaders/isolinux
          sudo cp -aL /usr/share/live/build/bootloaders/isolinux/* LUNA-os/config/bootloaders/isolinux/ || \
            sudo cp -a /usr/share/live/build/bootloaders/isolinux/* LUNA-os/config/bootloaders/isolinux/
          # Remove live.cfg.in - we provide our own isolinux.cfg
          # live.cfg.in causes mv binary/live/vmlinuz-* which fails in Ubuntu mode
          sudo rm -f LUNA-os/config/bootloaders/isolinux/live.cfg.in
          # Remove splash.svg.in to avoid rsvg-convert issues with multiple SVG files
          sudo rm -f LUNA-os/config/bootloaders/isolinux/splash.svg.in
          # Create a minimal 1x1 transparent PNG bootlogo (required by lb_binary_syslinux)
          echo 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==' | base64 -d | sudo tee LUNA-os/config/bootloaders/isolinux/bootlogo >/dev/null
          ls -la LUNA-os/config/bootloaders/isolinux/
          # Create dummy gfxboot-theme-ubuntu bootlogo.tar.gz with proper PNG file
          # live-build's lb_binary_syslinux tries to extract this in Ubuntu mode
          sudo mkdir -p LUNA-os/config/includes.chroot/usr/share/gfxboot-theme-ubuntu
          # Create a temporary directory with a valid bootlogo PNG
          TMPDIR=$(mktemp -d)
          echo 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==' | base64 -d > "$TMPDIR/bootlogo"
          # Create tar.gz with the bootlogo inside
          tar -czf LUNA-os/config/includes.chroot/usr/share/gfxboot-theme-ubuntu/bootlogo.tar.gz -C "$TMPDIR" bootlogo
          rm -rf "$TMPDIR"
          # Also add grub theme to the bootloaders directory
          sudo mkdir -p LUNA-os/config/bootloaders/grub/themes/astronaut
          sudo cp -r LUNA-os/config/includes.chroot/boot/grub/themes/astronaut/* LUNA-os/config/bootloaders/grub/themes/astronaut/

      - name: Build Luna OS ISO
        working-directory: LUNA-os
        run: |
          set -o pipefail
          sudo lb clean --all
          sudo ./auto/config
          sudo lb build 2>&1 | tee build.log
          echo "===== TAIL OF build.log ====="
          tail -n 200 build.log || true
          echo "===== ISO LISTING ====="
          ls -la *.iso || true
          echo "===== POST-PROCESSING WITH ISOHYBRID ====="
          which isohybrid && sudo isohybrid *.iso || echo "isohybrid not available, skipping"

      - name: Upload Luna OS ISO
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: luna-os-iso
          path: LUNA-os/*.iso
          retention-days: 7
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: luna-os-build-logs
          path: LUNA-os/build.log
          retention-days: 7
          if-no-files-found: ignore
