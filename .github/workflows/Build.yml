name: Build Luna OS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo add-apt-repository -y universe
          sudo apt-get update
          sudo apt-get install -y \
            live-build xorriso dosfstools mtools \
            grub-efi-amd64-bin grub2-common \
            debootstrap squashfs-tools bc

      - name: Build GRUB EFI boot image
        run: |
          set -e
          echo "I: Building GRUB EFI binary..."
          sudo mkdir -p /tmp/grub-build
          sudo grub-mkimage \
            -O x86_64-efi \
            -o /tmp/grub-build/BOOTX64.EFI \
            -p /boot/grub \
            -d /usr/lib/grub/x86_64-efi \
            linux normal search configfile ls cat echo test true reboot \
            all_video gfxterm font gfxmenu png gettext \
            iso9660 udf part_gpt part_msdos \
            search_label search_fs_uuid
          echo "I: GRUB EFI binary built: $(ls -la /tmp/grub-build/BOOTX64.EFI)"

          echo "I: Creating FAT EFI boot image..."
          # Create 4MB FAT12 image
          dd if=/dev/zero of=/tmp/grub-build/efi-boot.img bs=512 count=8192 2>/dev/null
          mkfs.fat -F 12 -n "EFI" /tmp/grub-build/efi-boot.img

          # Populate FAT image with EFI boot files
          mmd -i /tmp/grub-build/efi-boot.img ::EFI
          mmd -i /tmp/grub-build/efi-boot.img ::EFI/BOOT
          mcopy -i /tmp/grub-build/efi-boot.img /tmp/grub-build/BOOTX64.EFI ::EFI/BOOT/

          # Create startup.nsh as fallback
          echo -e 'echo -off\nfor loadoption in EFI\\BOOT\\*.efi; do\n  if exist "$loadoption" then\n    load "$loadoption"\n    exit\n  endif\ndone\n' > /tmp/grub-build/startup.nsh
          mcopy -i /tmp/grub-build/efi-boot.img /tmp/grub-build/startup.nsh ::EFI/BOOT/

          echo "I: FAT EFI boot image created: $(ls -la /tmp/grub-build/efi-boot.img)"
          mdir -i /tmp/grub-build/efi-boot.img ::EFI/BOOT/

      - name: Build Luna OS ISO
        working-directory: LUNA-os
        run: |
          set -o pipefail
          sudo lb clean --all
          sudo ./auto/config
          sudo lb build 2>&1 | tee build.log
          echo "===== TAIL OF build.log ====="
          tail -n 200 build.log || true
          echo "===== ISO LISTING ====="
          ls -la *.iso || true

      - name: Rebuild ISO with UEFI boot
        working-directory: LUNA-os
        run: |
          set -e
          ISO_IN=$(ls *.iso)
          echo "I: Rebuilding $ISO_IN with UEFI-only boot..."

          # Extract ISO contents
          TMPDIR=$(mktemp -d)
          sudo 7z x -o"$TMPDIR" "$ISO_IN" > /dev/null 2>&1

          # Copy GRUB EFI binary and FAT boot image into extracted ISO
          sudo cp /tmp/grub-build/BOOTX64.EFI "$TMPDIR/EFI/BOOT/BOOTX64.EFI"
          sudo cp /tmp/grub-build/efi-boot.img "$TMPDIR/efi-boot.img"

          # Create startup.nsh fallback
          sudo mkdir -p "$TMPDIR/EFI/BOOT"
          echo -e 'echo -off\nfor loadoption in EFI\\BOOT\\*.efi; do\n  if exist "$loadoption" then\n    load "$loadoption"\n    exit\n  endif\ndone\n' | sudo tee "$TMPDIR/EFI/BOOT/startup.nsh" > /dev/null

          # Create vmlinuz/initrd.img symlinks in casper/
          cd "$TMPDIR/casper"
          for f in vmlinuz-*; do
            [ -f "$f" ] || continue
            sudo ln -sf "$f" vmlinuz
            break
          done
          for f in initrd.img-*; do
            [ -f "$f" ] || continue
            sudo ln -sf "$f" initrd.img
            break
          done
          cd -

          # Rebuild ISO with xorriso - UEFI only via FAT EFI boot image
          ISO_OUT="${ISO_IN}"
          sudo xorriso -as mkisofs \
            -r -J \
            -V "LUNA-OS" \
            -iso-level 3 \
            -o "$TMPDIR/$ISO_OUT" \
            -e efi-boot.img \
            -no-emul-boot \
            -isohybrid-gpt-basdat \
            "$TMPDIR"

          sudo mv "$TMPDIR/$ISO_OUT" "./$ISO_OUT"
          sudo rm -rf "$TMPDIR"
          echo "I: ISO rebuilt with UEFI-only boot: $(ls -la $ISO_OUT)"

          # Verify
          xorriso -indev "$ISO_OUT" -report_el_torito as_mkisofs 2>/dev/null || true

      - name: Upload Luna OS ISO
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: luna-os-iso
          path: LUNA-os/*.iso
          retention-days: 7
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: luna-os-build-logs
          path: LUNA-os/build.log
          retention-days: 7
          if-no-files-found: ignore
