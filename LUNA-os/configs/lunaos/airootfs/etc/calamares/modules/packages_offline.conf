---
# LUNA OS - Offline Packages Configuration
# Removes live-only packages after installation

backend: pacman
skip_if_no_internet: true
update_db: false
update_system: false

pacman:
  num_retries: 0
  disable_download_timeout: false
  needed_only: false

operations:
  - try_remove:
      # Calamares and installer packages
      - calamares
      - calamares-branding-lunaos

      # Archiso live session packages
      - mkinitcpio-archiso
      - archiso
      - squashfs-tools

      # Build tools not needed on target
      - base-devel
      - git
      - cmake
      - gcc
      - make

      # Live session tools
      - reflector
      - wireless_tools
      - wpa_supplicant
      - iwd
      - avahi
      - xdg-utils
      - xdg-user-dirs

      # VM guest tools (optional)
      - virtualbox-guest-utils
      - open-vm-tools
