name: Build Luna OS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build xorriso isolinux syslinux-common \
            debootstrap squashfs-tools bc

      - name: Build Luna OS ISO
        working-directory: LUNA-os
        run: |
          set -o pipefail
          sudo lb clean --all
          sudo lb config
          sudo lb build 2>&1 | tee build.log
          echo "===== TAIL OF build.log =====" 
          tail -n 200 build.log || true
          echo "===== ISO LISTING ====="
          ls -la *.iso || true
          # Always keep the log, even on failure.

      - name: Upload build logs (success)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: luna-os-build-logs
          path: |
            LUNA-os/build.log
            LUNA-os/config/binary*
          retention-days: 7


      - name: Upload ISO artifact (success)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: luna-os-iso
          path: LUNA-os/*.iso
          retention-days: 7
          if-no-files-found: error

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: luna-os-build-logs
          path: |
            LUNA-os/build.log
          retention-days: 7
          if-no-files-found: ignore
