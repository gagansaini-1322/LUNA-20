# Luna OS GRUB menu
set default="0"
set timeout=15
set timeout_style=menu
insmod all_video
insmod gfxterm
insmod gzio
set gfxmode=auto
terminal_output gfxterm

# Astronaut Catppuccin GRUB Theme
insmod png
set theme=/boot/grub/themes/astronaut/theme.txt

menuentry "Luna OS" {
    search --no-floppy --set=root --file /casper/filesystem.squashfs
    linux /casper/vmlinuz boot=casper components console=ttyS0,115200n8 quiet splash username=luna hostname=luna live-config.user-fullname=Luna live-config.username=luna live-config.userpassword=luna
    initrd /casper/initrd
}

menuentry "Luna OS (debug)" {
    search --no-floppy --set=root --file /casper/filesystem.squashfs
    linux /casper/vmlinuz boot=casper components username=luna hostname=luna live-config.user-fullname=Luna live-config.username=luna live-config.userpassword=luna console=ttyS0,115200n8 debug
    initrd /casper/initrd
}

menuentry "Luna OS (safe graphics)" {
    search --no-floppy --set=root --file /casper/filesystem.squashfs
    linux /casper/vmlinuz boot=casper components console=ttyS0,115200n8 quiet splash nomodeset username=luna hostname=luna live-config.user-fullname=Luna live-config.username=luna live-config.userpassword=luna
    initrd /casper/initrd
}

menuentry "Reboot to firmware (UEFI)" {
    fwsetup
}
