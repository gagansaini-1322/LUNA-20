---
# LUNA OS - Post-Install Gaming Optimization
# Runs after installation to configure gaming optimizations

dontChroot: false
timeout: 120
verbose: false

script:
  # Enable services
  - "-chroot ${ROOT} systemctl enable NetworkManager"
  - "-chroot ${ROOT} systemctl enable sddm"
  - "-chroot ${ROOT} systemctl enable bluetooth"
  - "-chroot ${ROOT} systemctl enable gamemode"

  # Gaming optimizations
  - "-chroot ${ROOT} bash -c 'echo \"vm.max_map_count=2147483642\" > /etc/sysctl.d/80-gamecompat.conf'"
  - "-chroot ${ROOT} sysctl --system"

  # Configure user groups for gaming
  - "-chroot ${ROOT} bash -c 'if id ${USER} &>/dev/null; then usermod -aG video,audio,storage,gamemode ${USER}; fi'"

  # Set default target to graphical
  - "-chroot ${ROOT} systemctl set-default graphical.target"

  # Clean package cache
  - "-chroot ${ROOT} pacman -Scc --noconfirm"

  # Remove tmp files
  - "-chroot ${ROOT} rm -rf /tmp/*"
  - "-chroot ${ROOT} rm -rf /var/tmp/*"
