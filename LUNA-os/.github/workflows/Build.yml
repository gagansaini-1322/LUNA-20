name: Build Luna OS ISO
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build xorriso isolinux syslinux-common \
            debootstrap squashfs-tools bc

      - name: Patch grub-mkimage in lb_binary_iso
        run: |
          sudo sed -i "s|grub-mkimage -d|grub-mkimage -p /boot/grub -d|g" /usr/lib/live/build/lb_binary_iso
          grep -n grub-mkimage /usr/lib/live/build/lb_binary_iso
          # Also keep grub-pc installed during binary stage so modules are available
          sudo sed -i "/Remove_package/i cp -r chroot/usr/lib/grub/i386-pc binary/boot/grub/ 2>/dev/null || true" /usr/lib/live/build/lb_binary_grub2

      - name: Patch lb_chroot_linux-image
        run: |
          SCRIPT=$(dpkg -L live-build | grep "lb_chroot_linux-image$")
          sudo sed -i '/dists.*Contents/{ s/.*/true/; }' "$SCRIPT"

      - name: Patch lb_chroot_hacks
        run: |
          # Fix dangling symlink chmod failure that exits the build before binary phase
          sudo sed -i 's#xargs -r -0 chmod go+r$#xargs -r -0 chmod go+r 2>/dev/null || true#' /usr/lib/live/build/lb_chroot_hacks
          grep -n "chmod go+r" /usr/lib/live/build/lb_chroot_hacks || true

      - name: Build Luna OS ISO
        working-directory: LUNA-os
        run: |
          sudo lb clean --all
          sudo lb config
          sudo lb build 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: LUNA-os/build.log
          retention-days: 14

      - name: Upload Luna OS ISO
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: luna-os-iso
          path: LUNA-os/*.iso
          retention-days: 7
